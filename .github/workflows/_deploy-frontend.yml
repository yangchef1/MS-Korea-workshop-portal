# =============================================================================
# Reusable Workflow: Deploy Frontend (Build → SWA)
# =============================================================================
# Called by the orchestrator (deploy.yml). Not triggered directly.

name: _Deploy Frontend

on:
  workflow_call:
    inputs:
      environment:
        description: "Target environment (dev | prod)"
        required: true
        type: string
      api_base_url:
        description: "Backend API base URL. Overrides auto-resolved URL when provided."
        required: false
        type: string
        default: ""

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Deploy Frontend (${{ inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      # Always resolve the backend FQDN from Azure to avoid stale URLs
      # when CAE is recreated (e.g. VNet integration changes).
      - name: Azure Login (OIDC)
        if: inputs.api_base_url == ''
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_SP_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_SP_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve backend URL from Azure
        if: inputs.api_base_url == ''
        id: resolve-url
        run: |
          FQDN=$(az containerapp show \
            --name ca-workshop-backend-${{ inputs.environment }} \
            --resource-group rg-workshop-portal-${{ inputs.environment }} \
            --query "properties.configuration.ingress.fqdn" \
            -o tsv)
          echo "api_base_url=https://${FQDN}/api" >> $GITHUB_OUTPUT
          echo "Resolved backend URL: https://${FQDN}/api"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install & Build
        working-directory: frontend
        env:
          VITE_AZURE_CLIENT_ID: ${{ vars.VITE_AZURE_CLIENT_ID }}
          VITE_AZURE_TENANT_ID: ${{ vars.VITE_AZURE_TENANT_ID }}
          VITE_AZURE_REDIRECT_URI: ${{ vars.VITE_AZURE_REDIRECT_URI }}
          # Priority: infra output > Azure query > stored variable (last resort).
          VITE_API_BASE_URL: ${{ inputs.api_base_url || steps.resolve-url.outputs.api_base_url || vars.VITE_API_BASE_URL }}
        run: |
          npm ci
          npm run build

      - name: Deploy to SWA
        uses: azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend/dist
          skip_app_build: true
          skip_api_build: true
